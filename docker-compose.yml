services:

  # single node qdrant

  qdrant-0:
    container_name: qdrant-0
    image: qdrant/qdrant:${QDRANT_VERSION}
    entrypoint: ./entrypoint.sh

    # we use environment variables instead of command since github actions do not support command section
    #command: --uri 'http://qdrant-1:6335'

    environment:
      QDRANT__CLUSTER__ENABLED: false
      QDRANT_URI: 'http://qdrant-0:6335'

    volumes:
      - qdrant-storage-0:/qdrant/storage
      - snapshot-data-0:/qdrant/snapshots
      - ./qdrant-config.yaml:/qdrant/config/production.yaml
    ports:
      - "6333:6333"
      - "6334:6334"
      - "6335:6335"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '3'
          memory: 2G

  # 2-node qdrant cluster - for cluster tests

  qdrant-1:
    container_name: qdrant-1
    image: qdrant/qdrant:${QDRANT_VERSION}
    entrypoint: ./entrypoint.sh

    environment:
      QDRANT__CLUSTER__ENABLED: true
      QDRANT_URI: 'http://qdrant-1:6335'
    
    volumes:
      - qdrant-storage-1:/qdrant/storage
      - snapshot-data-1:/qdrant/snapshots
      - ./qdrant-config-cluster.yaml:/qdrant/config/production.yaml
    ports:
      - "6343:6333"
      - "6344:6334"
      - "6345:6335"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '3'
          memory: 2G

  qdrant-2:
    container_name: qdrant-2
    image: qdrant/qdrant:${QDRANT_VERSION}
    entrypoint: ./entrypoint.sh

    environment:
      QDRANT__CLUSTER__ENABLED: true
      QDRANT_URI: 'http://qdrant-2:6335'
      QDRANT_BOOTSTRAP: 'http://qdrant-1:6335'

    volumes:
      - qdrant-storage-2:/qdrant/storage
      - snapshot-data-2:/qdrant/snapshots
      - ./qdrant-config-cluster.yaml:/qdrant/config/production.yaml
    ports:
      - "6353:6333"
      - "6354:6334"
      - "6355:6335"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '3'
          memory: 2G

  # single node qdrant for multi-client tests

  qdrant-00:
    container_name: qdrant-00
    image: qdrant/qdrant:${QDRANT_VERSION}
    entrypoint: ./entrypoint.sh

    environment:
      QDRANT__CLUSTER__ENABLED: false
      QDRANT_URI: 'http://qdrant-00:6335'
    
    volumes:
      - qdrant-storage-00:/qdrant/storage
      - snapshot-data-00:/qdrant/snapshots
      - ./qdrant-config.yaml:/qdrant/config/production.yaml
    ports:
      - "6363:6333"
      - "6364:6334"
      - "6365:6335"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '3'
          memory: 2G

